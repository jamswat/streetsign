{% extends "index.html" %}

{% block body %}
<h1>External Data Source ({{ source.type }})</h1>
<form method="POST" role="form" id="source_form" class="needs-validation" novalidate>
<input type="hidden" name="type" value="{{ source.type}}" />

<div class="row">
<div class="col-md-10">
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Settings</h2>
    </div>
    <div class="card-body">
      <div class="row">
      <div class="mb-3 col-md-6">
        <label class="col-form-label">Name:</label>
        <input class="form-control" name="name" type="text" value="{{ source.name }}" required />
      </div>
      <div class="col-md-3">
        <div class="mb-3">
          <label class="form-label">Feed:</label>
          <select class="form-control" name="feed">
            {% for f in feeds %}
              <option value="{{f.id}}" {{ "selected" if f == source.feed else ""}}>{{f.name}}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="col-md-3">
        <div class="mb-3">
          <label class="form-label">Update Every:</label>
          <div class="input-group">
            <input class="form-control" name="frequency" type="number" value="{{ source.frequency }}" />
            <span class="input-group-text">minutes</span>
          </div>
        </div>
        <small>(last checked: {{ source.last_checked }})</small>
      </div>
      </div>
    </div>
  </div>
</div>
<div class="col-md-2">
    <input class="btn btn-primary d-block mb-2 w-100" type="submit" value="Save" />
    <a class="btn btn-success d-block mb-2" href="#" id="test_btn">Test</a>
    {% if source.id %}
        <a class="btn btn-info d-block" href="{{ url_for('external_source_run', source_id=source.id) }}" id="run_now">Run Now</a>
    {% endif %}
</div>
</div>

<div class="row mt-4">
<div class="col-md-8">
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">{{ source.type}} settings</h2>
    </div>
    <div class="card-body">
      {{ form |safe }}
    </div>
  </div>
<div id="test_area">for tests...</div>
</div>

<div class="col-md-4"><div class="card">
  <div class="card-header">
    <h2 class="card-title">New Post Lifetime</h2>
  </div>
  <div class="card-body">
    <div class="mb-3">
      <label class="col-form-label">Start Time Formula</label>
        <input class="form-control" name="active_start" type="text" value="{{source.lifetime_start}}"/>
    </div>

    <div class="mb-3">
      <label class="col-form-label">End Time Formula</label>
        <input class="form-control" name="active_end" type="text" value="{{source.lifetime_end}}" />
    </div>

    <div class="mb-3">
      <label class="col-form-label">Display-time on screen</label>
        <div class="input-group">
            <input class="form-control" name="display_time" type="number" value="{{ source.display_time if source.display_time else 8 }}" title="How long should each post be displayed on screen for?" />
            <span class="input-group-text">seconds</span>
        </div>
    </div>

    <div class="mb-3">
      <div class="form-check">
      <input class="form-check-input" type="checkbox" name="publish" {{ "checked" if source.publish else '' }} />
      <label class="form-check-label">Publish automatically?</label>
      </div>
    </div>

  </div>
</div>
</div>
</div>

</form>
<script type="text/javascript">
$('#test_btn').click(function(e){
    e.preventDefault();
    $('#test_area').load(
        "{{ url_for('external_source_test') }}",
        $('#source_form').serialize());
});

$('#run_now').click(function(e){
    e.preventDefault();
    $.post(this.href, {"force":"yes"}, function() { location.reload(); });
});
</script>
{% endblock %}
