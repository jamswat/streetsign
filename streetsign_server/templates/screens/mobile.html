<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <title>Screen</title>
    <style>
        :root {
            --bg: #000;
            --panel-bg: rgba(0, 0, 0, 0.2);
            --list-bg: rgba(255, 255, 255, 0.8);
            --navbar-bg: rgba(0, 0, 0, 0.7);
            --text-color: #fff;
            --text-secondary: #ccc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #navbar {
            display: flex;
            align-items: center;
            background: var(--navbar-bg);
            padding: 0.5em 1em;
            min-height: 3em;
            flex-shrink: 0;
        }

        #navbar a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1em;
            padding: 0.3em 0.8em;
            border-radius: 5px;
        }

        #navbar a:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        #navbar .back-btn {
            display: none;
            margin-right: 0.5em;
        }

        #navbar .back-btn.visible {
            display: inline-flex;
        }

        #navbar .home-btn {
            font-weight: bold;
        }

        #zone-list {
            background: var(--list-bg);
            color: #111;
            border-radius: 12px;
            margin: 0.5em;
            overflow: hidden;
        }

        #zone-list li {
            list-style: none;
        }

        #zone-list a {
            display: block;
            padding: 1em;
            text-decoration: none;
            color: #111;
            font-size: 1.2em;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        #zone-list a:last-child {
            border-bottom: none;
        }

        #zone-list a:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        #content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .panel {
            display: none;
            padding: 0.5em;
        }

        .panel.active {
            display: block;
        }

        .post-list {
            list-style: none;
            margin: 0.5em 0;
            border-radius: 12px;
            overflow: hidden;
        }

        .post-list li {
            background: var(--list-bg);
            color: #111;
            padding: 1em;
            margin-bottom: 0.5em;
            border-radius: 12px;
        }

        .post-list h2 {
            font-size: 1.1em;
            margin-bottom: 0.5em;
        }

        .post-list img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="navbar">
        <button class="back-btn" id="back-btn" aria-label="Back">&larr; Back</button>
        <a href="#" class="home-btn" id="home-btn">Home</a>
        <span style="flex:1; text-align:center; font-size:1.1em" id="page-title"></span>
    </div>
    <div id="content">
        <ul id="zone-list"></ul>
        <div id="zone-panels"></div>
    </div>

    <script src="/static/lib/jquery.js"></script>
    <script>
        'use strict';

        const SCREEN_DATA = {{ screen.to_dict() | tojson|safe }};
        const POSTS_URL = "{{ url_for('screens_posts_from_feeds', json_feeds_list='-1') }}";

        const backBtn = document.getElementById('back-btn');
        const homeBtn = document.getElementById('home-btn');
        const pageTitle = document.getElementById('page-title');
        const zoneList = document.getElementById('zone-list');
        const zonePanels = document.getElementById('zone-panels');

        // Build zone list
        SCREEN_DATA.zones.forEach((zone, i) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#zone_' + i;
            a.textContent = zone.name;
            a.addEventListener('click', (e) => {
                e.preventDefault();
                showZone(i);
            });
            li.appendChild(a);
            zoneList.appendChild(li);

            // Create zone panel
            const panel = document.createElement('div');
            panel.className = 'panel';
            panel.id = 'zone_' + i;
            const ul = document.createElement('ul');
            ul.className = 'post-list';
            ul.id = 'zone_postlist_' + i;
            panel.appendChild(ul);
            zonePanels.appendChild(panel);

            // Fetch posts
            loadZonePosts(i, zone, ul);
        });

        function showZone(idx) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const panel = document.getElementById('zone_' + idx);
            if (panel) panel.classList.add('active');
            zoneList.style.display = 'none';
            backBtn.classList.add('visible');
            pageTitle.textContent = SCREEN_DATA.zones[idx].name;
        }

        function showHome() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            zoneList.style.display = '';
            backBtn.classList.remove('visible');
            pageTitle.textContent = '';
        }

        backBtn.addEventListener('click', showHome);
        homeBtn.addEventListener('click', (e) => { e.preventDefault(); showHome(); });

        function loadZonePosts(zoneId, zoneData, postListEl) {
            const feedsUrl = POSTS_URL.replace('-1', JSON.stringify(zoneData.feeds));

            $.getJSON(feedsUrl, (data) => {
                data.posts.forEach(postSummary => {
                    $.getJSON(postSummary.uri, (postInfo) => {
                        const li = document.createElement('li');
                        if (postInfo.type === 'html' || postInfo.type === 'text') {
                            li.innerHTML = postInfo.content.content;
                        } else if (postInfo.type === 'image') {
                            const img = document.createElement('img');
                            img.src = postInfo.content.file_url;
                            img.alt = 'Image post';
                            img.loading = 'lazy';
                            li.appendChild(img);
                        } else {
                            li.textContent = JSON.stringify(postInfo);
                        }
                        postListEl.appendChild(li);
                    });
                });
            });

            // Poll for new posts periodically
            let lastPostIds = null;
            setInterval(() => {
                $.getJSON(feedsUrl, (data) => {
                    const ids = data.posts.map(p => p.id).join(',');
                    if (lastPostIds !== null && ids !== lastPostIds) {
                        document.location.reload();
                    }
                    lastPostIds = ids;
                });
            }, 60000);
        }
    </script>
</body>
</html>
