<link rel="stylesheet" href="{{ url_for('static', filename='lib/prism/prism.min.css') }}" />
<style>
.rawhtml-editor-wrap {
  position: relative;
  width: 100%;
  margin-top: 8px;
}
.rawhtml-editor-wrap textarea,
.rawhtml-editor-wrap pre {
  width: 100%;
  min-height: 400px;
  margin: 0;
  padding: 10px;
  font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 13px;
  line-height: 1.5;
  tab-size: 2;
  box-sizing: border-box;
  white-space: pre-wrap;
  word-wrap: break-word;
  border: 1px solid #ced4da;
  border-radius: 4px;
  overflow: auto;
}
.rawhtml-editor-wrap textarea {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  color: transparent;
  background: transparent;
  caret-color: black;
  resize: vertical;
}
.rawhtml-editor-wrap textarea:focus {
  outline: none;
  border-color: #86b7fe;
  box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
}
.rawhtml-editor-wrap pre {
  z-index: 0;
  border-color: transparent;
  pointer-events: none;
  background: #f5f2f0;
}
</style>

<label>Raw HTML:</label>
<div class="rawhtml-editor-wrap">
  <textarea id="rawhtml-editor" name="content" spellcheck="false" rows="20">{{ content }}</textarea>
  <pre><code class="language-html" id="rawhtml-highlight"></code></pre>
</div>

<script src="{{ url_for('static', filename='lib/prism/prism.min.js') }}"></script>
<script type="text/javascript">
(function() {
  var editor = document.getElementById('rawhtml-editor');
  var highlight = document.getElementById('rawhtml-highlight');

  function update() {
    highlight.textContent = editor.value;
    Prism.highlightElement(highlight);
    highlight.parentElement.scrollTop = editor.scrollTop;
    highlight.parentElement.scrollLeft = editor.scrollLeft;
  }

  editor.addEventListener('input', update);
  editor.addEventListener('scroll', function() {
    highlight.parentElement.scrollTop = editor.scrollTop;
    highlight.parentElement.scrollLeft = editor.scrollLeft;
  });
  editor.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      var start = editor.selectionStart;
      var end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      update();
    }
  });

  update();
})();
</script>
