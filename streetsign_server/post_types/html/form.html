<div class="clearfix"></div>
<label>Contents: (rich text/HTML) </label><br/>
<label>Custom Text Color:<input type="checkbox" name="owntextcolor" value="1" {{ 'checked' if owntextcolor }}></label>
<label id="color_input" class="{{ 'hidden' if not owntextcolor }}">Color:<input type="color" name="color" value="{{color}}"/></label>

<div id="contenttextarea" style="min-height:300px;">{{ content }}</div>
<textarea name="content" id="content-hidden" style="display:none;"></textarea>

<script type="text/javascript" defer>

$( function() {

    $('input[type=color]').spectrum({
       clickoutFiresChange: true,
       showInput: true,
       showPalette: true,
       showInitial: true,
       showButtons: false
    });

    var quill = new Quill('#contenttextarea', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'script': 'sub' }, { 'script': 'super' }],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'align': [] }, { 'indent': '-1' }, { 'indent': '+1' }],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                ['blockquote', 'code-block'],
                ['link', 'image', 'video'],
                ['clean']
            ]
        }
    });

    document.getElementById('post-editor-form').addEventListener('submit', function() {
        document.getElementById('content-hidden').value = quill.root.innerHTML;
    });

    $('input[name=owntextcolor]').change(function(){
        $('#color_input').toggleClass('hidden');
    });

});
</script>
