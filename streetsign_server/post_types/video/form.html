<br/><br/>
<label>Video file:</label><br/>
<input type="file" name="video_file"
       accept=".mp4,.webm,.ogg,.ogv,.mov"
       style="width: 100%;" />
<input type="hidden" name="upload" value="1" />

{% if file_url %}
<hr/>
<b>Preview:</b><br/>
<video controls style="width:100%;max-height:200px"
       src="{{ file_url }}"></video>
{% endif %}

<hr/>
<label>
  <input type="checkbox" name="audio_enabled" value="1"
         {{ 'checked' if audio_enabled }}>
  🔊 Enable audio
  <small>(requires tap on screen to start)</small>
</label>
<p class="text-muted">
  Supported formats: MP4 (.mp4), WebM (.webm), Ogg (.ogg, .ogv), MOV (.mov)
</p>
