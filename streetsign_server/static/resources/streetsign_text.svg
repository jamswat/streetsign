<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 360" width="1040" height="360" role="img" aria-label="StreetSign">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="scr2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="ess2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/><stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- icon scaled to 280px, vertically centered (y 40–320) -->
  <g transform="translate(36,40) scale(0.546875)">
    <rect width="512" height="512" rx="104" fill="url(#bg2)"/>
    <rect x="242" y="300" width="28" height="62" fill="#0F172A"/>
    <rect x="182" y="356" width="148" height="24" rx="12" fill="#0F172A"/>
    <rect x="92" y="84" width="328" height="224" rx="30" fill="#0F172A"/>
    <rect x="116" y="108" width="280" height="176" rx="18" fill="url(#scr2)"/>
    <path d="M302 163 A46 33 0 1 0 256 196 A46 33 0 1 1 210 229"
          fill="none" stroke="url(#ess2)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark, baseline tuned to icon center -->
  <text x="360" y="222" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="116" font-weight="800" letter-spacing="-3">
    <tspan fill="#0F172A">Street</tspan><tspan fill="#2563EB">Sign</tspan>
  </text>
</svg>
