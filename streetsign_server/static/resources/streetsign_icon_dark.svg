<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="StreetSign logo (dark)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="ess" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- stand (behind display) -->
  <rect x="242" y="300" width="28" height="62" fill="#020617"/>
  <rect x="182" y="356" width="148" height="24" rx="12" fill="#020617"/>

  <!-- display bezel -->
  <rect x="92" y="84" width="328" height="224" rx="30" fill="#020617"/>
  <rect x="93.5" y="85.5" width="325" height="221" rx="28.5" fill="none" stroke="#475569" stroke-width="3"/>

  <!-- screen -->
  <rect x="116" y="108" width="280" height="176" rx="18" fill="url(#screen)"/>

  <!-- symmetric brand S -->
  <path d="M302 163 A46 33 0 1 0 256 196 A46 33 0 1 1 210 229"
        fill="none" stroke="url(#ess)" stroke-width="28"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
