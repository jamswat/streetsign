services:
  app:
    image: ghcr.io/jamswat/streetsign:1.0
    # build: .   # uncomment and remove "image:" above to build locally
    ports:
      - "${WEB_PORT:-5000}:5000"
    environment:
      # Generate a long random key:  python3 -c "import uuid; print(uuid.uuid4())"
      - SECRET_KEY=${SECRET_KEY:-change-me}
    volumes:
      - db_data:/data
      - uploads:/app/streetsign_server/static/user_files
    restart: unless-stopped

volumes:
  db_data:
  uploads:
